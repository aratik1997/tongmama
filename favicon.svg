<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="pixelClip">
      <polygon points="4,14 14,14 14,4 86,4 86,14 96,14 96,86 86,86 86,96 14,96 14,86 4,86"/>
    </clipPath>
    <radialGradient id="screenGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#3a1b63" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0a0716" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#pixelClip)">
    <rect x="4" y="4" width="92" height="92" fill="#0a0716"/>
    <rect x="4" y="4" width="92" height="92" fill="url(#screenGlow)"/>
    <!-- faint scanlines -->
    <g opacity="0.25">
      <rect x="4" y="8" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="20" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="32" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="44" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="56" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="68" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="80" width="92" height="1.5" fill="#ffffff"/>
      <rect x="4" y="92" width="92" height="1.5" fill="#ffffff"/>
    </g>

    <!-- pixel "T" (magenta), grid col 0-4, row 0-6, cell=6, origin 17,27 -->
    <g fill="#ff2ec4">
      <rect x="17.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="23.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="35.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="41.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="33.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="39.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="45.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="51.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="57.4" width="5.2" height="5.2"/>
      <rect x="29.4" y="63.4" width="5.2" height="5.2"/>
    </g>

    <!-- pixel "M" (cyan), grid col 6-10, row 0-6 -->
    <g fill="#00f0ff">
      <rect x="53.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="27.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="33.4" width="5.2" height="5.2"/>
      <rect x="59.4" y="33.4" width="5.2" height="5.2"/>
      <rect x="71.4" y="33.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="33.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="39.4" width="5.2" height="5.2"/>
      <rect x="65.4" y="39.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="39.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="45.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="45.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="51.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="51.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="57.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="57.4" width="5.2" height="5.2"/>
      <rect x="53.4" y="63.4" width="5.2" height="5.2"/>
      <rect x="77.4" y="63.4" width="5.2" height="5.2"/>
    </g>

    <!-- blinking "insert coin" accent pixel -->
    <rect x="80" y="10" width="8" height="8" fill="#f6ff5a"/>

    <!-- cabinet edge border -->
    <polygon points="4,14 14,14 14,4 86,4 86,14 96,14 96,86 86,86 86,96 14,96 14,86 4,86"
      fill="none" stroke="#ff2ec4" stroke-width="3"/>
  </g>
</svg>
